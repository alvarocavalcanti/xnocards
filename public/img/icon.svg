<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Card background -->
  <rect x="5" y="5" width="90" height="90" rx="12" ry="12"
        fill="#0f0f1a" stroke="#555" stroke-width="1.5"/>

  <!-- X — red, top-left -->
  <text x="28" y="42"
        font-family="serif" font-weight="700" font-size="28"
        fill="#ef4444" text-anchor="middle" dominant-baseline="middle">X</text>

  <!-- N — amber, bottom-left -->
  <text x="28" y="68"
        font-family="serif" font-weight="700" font-size="22"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="middle">N</text>

  <!-- O — green, bottom-right -->
  <text x="68" y="68"
        font-family="serif" font-weight="700" font-size="22"
        fill="#22c55e" text-anchor="middle" dominant-baseline="middle">O</text>
</svg>
